server:
  port: 8080

spring:
  application:
    name: hfnew-backend
  profiles:
    active: mysql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  type-aliases-package: com.hfnew.entity

app:
  jwt:
    # HS256 key length需要 >= 256bit（至少32字节），P0先用足够长的占位字符串避免 WeakKeyException
    access-secret: "CHANGE_ME_ACCESS_SECRET_CHANGE_ME_ACCESS_SECRET"
    refresh-secret: "CHANGE_ME_REFRESH_SECRET_CHANGE_ME_REFRESH_SECRET"
    # P0：Access 通常较短，便于验证 refresh；可按需调整
    access-ttl-seconds: 900
    refresh-ttl-seconds: 1209600
    issuer: "hfnew-backend"

  security:
    allowed-origins: "http://localhost:5173,http://www.ahylcc.cn,https://www.ahylcc.cn,http://ahylcc.cn,https://ahylcc.cn,http://43.138.7.82,https://43.138.7.82"

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:bj-cynosdbmysql-grp-q7xgsuf2.sql.tencentcdb.com}:${MYSQL_PORT:21671}/${MYSQL_DATABASE:hfcc}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data-mysql.sql

---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:hfnew;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data-h2.sql

